name: 'Setup ODC Environment'
description: 'Checkout, setup Go with cache, and install Just'
inputs:
  go-version:
    description: 'Go version to use'
    required: true
    default: '1.25.x'
  checkout:
    description: 'Whether to checkout the code'
    required: false
    default: 'true'
  fetch-depth:
    description: 'Fetch depth for checkout'
    required: false
    default: '1'
  just:
    description: 'Whether to setup Just'
    required: false
    default: 'true'

runs:
  using: "composite"
  steps:
    - name: Checkout code
      if: ${{ inputs.checkout == 'true' }}
      uses: actions/checkout@v6
      with:
        fetch-depth: ${{ inputs.fetch-depth }}

    - name: Setup Go
      uses: actions/setup-go@v6
      with:
        go-version: ${{ inputs.go-version }}
        cache: true

    - name: Setup Just
      if: ${{ inputs.just == 'true' }}
      uses: extractions/setup-just@v2
