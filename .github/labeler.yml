# ============================================
# COMPONENT LABELS
# ============================================

"component: go":
  - any:
      - changed-files:
          - any-glob-to-any-file:
              - "**/*.go"
              - "!internal/features/identity/**/*.go"
              - "!internal/shared/**/*.go"
              - "!internal/errors/**/*.go"
              - "!internal/concurrency/**/*.go"
              - "!internal/fs/**/*.go"
              - "!internal/drive/**/*.go"
              - "!internal/features/profile/**/*.go"
              - "!internal/state/**/*.go"
              - "!internal/features/config/**/*.go"
              - "!internal/di/**/*.go"
              - "!internal/features/environment/**/*.go"
              - "!internal/features/logger/**/*.go"
              - "!internal/middleware/**/*.go"
              - "!pkg/cache/**/*.go"
              - "!pkg/ignore/**/*.go"
              - "!cmd/odc/**/*.go"
              - "go.mod"
              - "go.sum"

"component: auth":
  - any:
      - changed-files:
          - any-glob-to-any-file:
              - "internal/features/identity/**"

"component: common":
  - any:
      - changed-files:
          - any-glob-to-any-file:
              - "internal/shared/**"
              - "internal/errors/**"
              - "internal/concurrency/**"
              - "internal/version/**"

"component: filesystem":
  - any:
      - changed-files:
          - any-glob-to-any-file:
              - "internal/fs/**"

"component: drive":
  - any:
      - changed-files:
          - any-glob-to-any-file:
              - "internal/drive/**"

"component: profile":
  - any:
      - changed-files:
          - any-glob-to-any-file:
              - "internal/features/profile/**"

"component: state":
  - any:
      - changed-files:
          - any-glob-to-any-file:
              - "internal/state/**"

"component: cache":
  - any:
      - changed-files:
          - any-glob-to-any-file:
              - "pkg/cache/**"

"component: config":
  - any:
      - changed-files:
          - any-glob-to-any-file:
              - "internal/features/config/**"

"component: logger":
  - any:
      - changed-files:
          - any-glob-to-any-file:
              - "internal/features/logger/**"

"component: di":
  - any:
      - changed-files:
          - any-glob-to-any-file:
              - "internal/di/**"

"component: environment":
  - any:
      - changed-files:
          - any-glob-to-any-file:
              - "internal/features/environment/**"

"component: middleware":
  - any:
      - changed-files:
          - any-glob-to-any-file:
              - "internal/middleware/**"

"component: ignore":
  - any:
      - changed-files:
          - any-glob-to-any-file:
              - "pkg/ignore/**"

"component: cli":
  - any:
      - changed-files:
          - any-glob-to-any-file:
              - "cmd/odc/**"
              - "internal/root/**"

"component: doc":
  - any:
      - changed-files:
          - any-glob-to-any-file:
              - "docs/**"
              - "**/*.md"
              - mkdocs.yaml
              - requirements.txt
              - doc.dockerfile

"component: ci":
  - any:
      - changed-files:
          - any-glob-to-any-file:
              - ".github/workflows/**"
              - ".github/labeler.yml"
              - ".github/dependabot.yaml"
              - ".vale.ini"
              - ".golangci.yml"
              - "justfile"
              - ".goreleaser.yaml"
              - ".release-please-manifest.json"
              - "release-please-config.json"
              - "requirements.txt"

# ============================================
# TYPE LABELS
# ============================================

"type: bug":
  - any:
      - head-branch:
          - "^bug"
          - "^fix"

"type: chore":
  - any:
      - head-branch:
          - "^chore"
          - "^ci"
          - "^build"

"type: task":
  - any:
      - head-branch:
          - "^feature"
          - "^feat"
          - "^task"
