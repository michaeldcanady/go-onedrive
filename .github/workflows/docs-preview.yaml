name: Docs preview

on:
  pull_request:
    branches:
      - main
    paths:
      - 'docs/**'
      - mkdocs.yml
      - requirements.txt
      - '.github/workflows/docs-preview.yaml'
      - '.github/workflows/_docs-validate.yaml'
      - '.github/actions/setup-docs/**'
      - '.vale.ini'
    types:
      - opened
      - synchronize
      - reopened
      - closed
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to build docs from; defaults to the branch this workflow runs from'
        required: false
      pr_number:
        description: 'PR number (used for deploy path: pr/{number}/)'
        required: true

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: 'docs-preview-{{ github.event.pull_request.number || inputs.pr_number }}'
  cancel-in-progress: true

jobs:
  validate:
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    uses: ./.github/workflows/_docs-validate.yaml
    with:
      ref: ${{ github.event.pull_request.head.sha || inputs.branch }}

  deploy-preview:
    needs: validate
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.branch || github.event.pull_request.head.sha }}

      - name: Setup Docs
        uses: ./.github/actions/setup-docs

      - name: Build docs
        run: |
          mkdocs build --site-dir site

      - name: Deploy preview
        uses: rossjrw/pr-preview-action@v1
        with:
          source-dir: site
          preview-branch: gh-pages
          umbrella-dir: pr-preview
          action: deploy
          qr-code: false

  remove-preview:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Remove preview
        uses: rossjrw/pr-preview-action@v1
        with:
          source-dir: site
          preview-branch: gh-pages
          umbrella-dir: pr-preview
          action: remove
