name: Go CI

on:
  workflow_dispatch:
  push:
    branches:
      - "**"
    paths:
      - "**.go"
      - ".github/workflows/go.yaml"
      - ".github/workflows/_go-*.yaml"
      - ".github/actions/**"
  pull_request:
    paths:
      - "**.go"
      - ".github/workflows/go.yaml"
      - ".github/workflows/_go-*.yaml"
      - ".github/actions/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

env:
  COVERAGE_FILE: coverage.out

permissions:
  contents: read

jobs:
  config:
    name: Global Configuration
    runs-on: ubuntu-latest
    outputs:
      go-version: "1.25.x"
      os-matrix: '["ubuntu-latest", "macos-latest", "windows-latest"]'
      cmds: '["odc", "storage-plugin-local", "storage-plugin-onedrive"]'
    steps:
      - run: echo "Initializing CI configuration"

  changes:
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.any_changed }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
      - name: Changed Files
        uses: tj-actions/changed-files@v47.0.1
        id: filter
        with:
          files: |
            **.go
            .github/workflows/go.yaml
            .github/workflows/_go-*.yaml

  check-go:
    name: Check Go Modules
    needs: [config, changes]
    if: ${{ needs.changes.outputs.code == 'true' }}
    uses: ./.github/workflows/_go-check.yaml
    with:
      go-version: ${{ needs.config.outputs.go-version }}

  build-go:
    name: Build Go Binaries
    needs: [config, changes]
    if: ${{ needs.changes.outputs.code == 'true' }}
    strategy:
      fail-fast: false
      matrix:
        os: ${{ fromJson(needs.config.outputs.os-matrix) }}
        cmd: ${{ fromJson(needs.config.outputs.cmds) }}
    uses: ./.github/workflows/_go-build.yaml
    with:
      go-version: ${{ needs.config.outputs.go-version }}
      os: ${{ matrix.os }}
      cmd: ${{ matrix.cmd }}

  lint-go:
    name: Lint Go Code
    needs: [config, changes]
    if: ${{ needs.changes.outputs.code == 'true' }}
    uses: ./.github/workflows/_go-lint.yaml
    with:
      go-version: ${{ needs.config.outputs.go-version }}

  security-go:
    name: Security Scan
    needs: [config, changes]
    if: ${{ needs.changes.outputs.code == 'true' }}
    uses: ./.github/workflows/_go-security.yaml
    with:
      go-version: ${{ needs.config.outputs.go-version }}

  benchmark-go:
    name: Performance Benchmarking
    needs: [config, changes, build-go]
    if: ${{ needs.changes.outputs.code == 'true' && github.event_name == 'pull_request' }}
    uses: ./.github/workflows/_go-benchmark.yaml
    with:
      go-version: ${{ needs.config.outputs.go-version }}
    permissions:
      contents: write

  test-fast:
    name: Fast Tests
    needs: [config, changes, build-go]
    if: ${{ needs.changes.outputs.code == 'true' }}
    strategy:
      fail-fast: false
      matrix:
        os: ${{ fromJson(needs.config.outputs.os-matrix) }}
        tier: [unit, integration, smoke]
    uses: ./.github/workflows/_go-test.yaml
    with:
      go-version: ${{ needs.config.outputs.go-version }}
      os: ${{ matrix.os }}
      tier: ${{ matrix.tier }}

  test-heavy:
    name: Heavy Tests
    needs: [config, changes, build-go]
    if: ${{ needs.changes.outputs.code == 'true' && github.event_name == 'pull_request' }}
    strategy:
      fail-fast: false
      matrix:
        os: ${{ fromJson(needs.config.outputs.os-matrix) }}
        tier: [functional]
    uses: ./.github/workflows/_go-test.yaml
    with:
      go-version: ${{ needs.config.outputs.go-version }}
      os: ${{ matrix.os }}
      tier: ${{ matrix.tier }}
