name: Go CI

on:
  workflow_dispatch:
  push:
    branches:
      - "**"
    paths:
      - "**.go"
      - ".github/workflows/go.yml"
      - ".github/actions/**"
  pull_request:
    paths:
      - "**.go"
      - ".github/workflows/go.yml"
      - ".github/actions/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

env:
  COVERAGE_FILE: coverage.out

permissions:
  contents: read

jobs:
  config:
    name: Global Configuration
    runs-on: ubuntu-latest
    outputs:
      go-version: "1.25.x"
      os-matrix: '["ubuntu-latest", "macos-latest", "windows-latest"]'
      cmds: '["odc", "storage-plugin-local", "storage-plugin-onedrive"]'
    steps:
      - run: echo "Initializing CI configuration"

  changes:
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.any_changed }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Changed Files
        uses: tj-actions/changed-files@v47.0.1
        id: filter
        with:
          files: |
            **.go
            .github/workflows/go.yml

  check-go:
    name: Check Go Modules
    needs: [config, changes]
    if: ${{ needs.changes.outputs.code == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Setup Environment
        uses: ./.github/actions/setup-odc
        with:
          go-version: ${{ needs.config.outputs.go-version }}
      - run: go mod download
      - run: go mod verify
      - run: |
          go mod tidy
          go generate ./...

  build-go:
    name: Build ${{ matrix.cmd }} (${{ matrix.os }})
    needs: [config, changes]
    if: ${{ needs.changes.outputs.code == 'true' }}
    strategy:
      fail-fast: false
      matrix:
        os: ${{ fromJson(needs.config.outputs.os-matrix) }}
        cmd: ${{ fromJson(needs.config.outputs.cmds) }}
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Setup Environment
        uses: ./.github/actions/setup-odc
        with:
          go-version: ${{ needs.config.outputs.go-version }}
      - run: go mod download
      - name: Build Command
        run: go build ./cmd/${{ matrix.cmd }}/

  lint-go:
    name: Lint Go Code
    needs: [config, changes]
    if: ${{ needs.changes.outputs.code == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Setup Environment
        uses: ./.github/actions/setup-odc
        with:
          go-version: ${{ needs.config.outputs.go-version }}
      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest
          skip-cache: false

  security-go:
    name: Security Scan
    needs: [config, changes]
    if: ${{ needs.changes.outputs.code == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Setup Environment
        uses: ./.github/actions/setup-odc
        with:
          go-version: ${{ needs.config.outputs.go-version }}
      - name: Run govulncheck
        uses: golang/govulncheck-action@v1
        with:
          go-version-input: ${{ needs.config.outputs.go-version }}
          go-package: ./...
      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  benchmark-go:
    name: Performance Benchmarking
    needs: [config, changes, build-go]
    if: ${{ needs.changes.outputs.code == 'true' && github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Setup Environment
        uses: ./.github/actions/setup-odc
        with:
          go-version: ${{ needs.config.outputs.go-version }}
      - name: Run benchmarks
        run: go test -v -bench=. -run=^$ ./... | tee benchmark_output.txt
      - name: Store benchmark result
        uses: benchmark-action/github-action-benchmark@v1
        with:
          name: Go Benchmark
          tool: 'go'
          output-file-path: benchmark_output.txt
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: true
          alert-threshold: '200%'
          comment-on-alert: true
          fail-on-alert: true

  test-fast:
    name: ${{ matrix.tier }} Tests (${{ matrix.os }})
    needs: [config, changes, build-go]
    if: ${{ needs.changes.outputs.code == 'true' }}
    strategy:
      fail-fast: false
      matrix:
        os: ${{ fromJson(needs.config.outputs.os-matrix) }}
        tier: [unit, integration, smoke]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Setup Environment
        uses: ./.github/actions/setup-odc
        with:
          go-version: ${{ needs.config.outputs.go-version }}
      - name: Run tests
        run: just test-${{ matrix.tier }}

  test-heavy:
    name: ${{ matrix.tier }} Tests (${{ matrix.os }})
    needs: [config, changes, build-go]
    if: ${{ needs.changes.outputs.code == 'true' && github.event_name == 'pull_request' }}
    strategy:
      fail-fast: false
      matrix:
        os: ${{ fromJson(needs.config.outputs.os-matrix) }}
        tier: [functional]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Setup Environment
        uses: ./.github/actions/setup-odc
        with:
          go-version: ${{ needs.config.outputs.go-version }}
      - name: Run tests
        run: just test-${{ matrix.tier }}
